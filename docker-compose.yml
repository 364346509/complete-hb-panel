version: '3.8'

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: hb-panel-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-hb_panel_root_2024}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-hb_panel}
      MYSQL_USER: ${MYSQL_USER:-hb_panel}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-hb_panel_2024}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - hb-panel-network

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: hb-panel-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - hb-panel-network

  # 后端API服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hb-panel-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=mysql+pymysql://${MYSQL_USER:-hb_panel}:${MYSQL_PASSWORD:-hb_panel_2024}@mysql:3306/${MYSQL_DATABASE:-hb_panel}
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-secret-key-here}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      - APP_NAME=${APP_NAME:-HB-Panel}
      - APP_VERSION=${APP_VERSION:-1.0.0}
      - DEBUG=${DEBUG:-false}
    volumes:
      - ./backend:/app
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/nginx:/etc/nginx
      - /etc/ssl:/etc/ssl
      - /www:/www
      - /var/log:/var/log
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      - mysql
      - redis
    networks:
      - hb-panel-network

  # 前端Web服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hb-panel-frontend
    restart: unless-stopped
    environment:
      - VITE_API_BASE_URL=http://localhost:${BACKEND_PORT:-8000}
      - VITE_APP_TITLE=${APP_NAME:-HB-Panel}
      - VITE_APP_VERSION=${APP_VERSION:-1.0.0}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    networks:
      - hb-panel-network

  # Nginx反向代理
  nginx:
    image: nginx:alpine
    container_name: hb-panel-nginx
    restart: unless-stopped
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
      - ./frontend/dist:/usr/share/nginx/html
      - /etc/ssl:/etc/ssl:ro
      - /var/log/nginx:/var/log/nginx
    ports:
      - "${NGINX_PORT:-8080}:80"
      - "443:443"
    depends_on:
      - frontend
      - backend
    networks:
      - hb-panel-network

  # phpMyAdmin数据库管理
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: hb-panel-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: ${MYSQL_USER:-hb_panel}
      PMA_PASSWORD: ${MYSQL_PASSWORD:-hb_panel_2024}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-hb_panel_root_2024}
    ports:
      - "8081:80"
    depends_on:
      - mysql
    networks:
      - hb-panel-network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  hb-panel-network:
    driver: bridge
